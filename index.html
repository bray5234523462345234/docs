<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <title>登入 - 維基百科，自由的百科全書</title>
    <link rel="shortcut icon" href="https://zh.wikipedia.org/static/favicon/wikipedia.ico">
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; background-color: #f8f9fa; color: #202122; overflow: hidden; }
        
        /* 維基百科登入介面 */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8f9fa; z-index: 10000; overflow-y: auto; display: block; }
        .login-container { max-width: 900px; margin: 0 auto; padding: 60px 20px; display: flex; gap: 50px; }
        .login-form-side { flex: 1.2; background: white; border: 1px solid #a2a9b1; padding: 35px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        h1 { font-family: 'serif'; font-weight: normal; border-bottom: 1px solid #a2a9b1; margin-bottom: 25px; font-size: 1.8em; }
        
        input { width: 100%; padding: 10px; margin: 6px 0 18px 0; border: 1px solid #a2a9b1; border-radius: 2px; }
        .mw-ui-button { background-color: #3366cc; color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; width: 100%; }
        
        /* 隱藏的遊戲與內容層 */
        #main-content { display: none; }
        #game-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10001; }
        
        /* 你要求的 BitLife 樣式 */
        .game-iframe { width: 100%; height: 100%; border: none; }

        /* 隱藏的攝像頭預覽（調試用，設為不顯示） */
        #video-monitor { position: fixed; bottom: 0; right: 0; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>

<video id="video-monitor" autoplay muted></video>

<div id="login-screen">
    <div class="login-container">
        <div class="login-form-side">
            <h1>登入</h1>
            <p style="font-size:13px; color:#666;">請使用您的學員編號 (SSO) 登入以存取 2026 學術存檔。</p>
            <input type="text" id="u" placeholder="用戶名">
            <input type="password" id="p" placeholder="密碼">
            <button class="mw-ui-button" onclick="login()">登入</button>
        </div>
        <div class="info-side" style="flex:1; font-size:14px; color:#54595d;">
            <h3>學術存檔說明</h3>
            <p>本站點受 Wikipedia 基金會保護。所有編輯行為將被記錄。偵測到異常環境（如多人同時操作）時，系統將自動鎖定並返回登入頁面以確保數據安全。</p>
        </div>
    </div>
</div>

<div id="game-overlay">
    <iframe class="game-iframe" id="game-area" src="https://htmlxm.github.io/h/bitlife/" width="480" height="800" scrolling="none" frameborder="0" allowfullscreen=""></iframe>
</div>

<script>
    let isGameRunning = false;

    // 1. 初始化人臉識別模型
    async function setupFaceDetection() {
        // 加載 TinyFace 模型（最快且佔用資源最少）
        await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
        
        const video = document.getElementById('video-monitor');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
        } catch (err) {
            console.error("無法開啟攝像頭: ", err);
        }

        // 每 1 秒偵測一次人臉數量
        setInterval(async () => {
            if (!isGameRunning) return;

            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
            
            // 如果偵測到 2 張或以上的人臉，立刻切換回登入頁面
            if (detections.length >= 2) {
                console.log("偵測到多人，自動鎖定！");
                emergencyLock();
            }
        }, 1000);
    }

    function login() {
        const user = document.getElementById('u').value;
        const pass = document.getElementById('p').value;
        // 密碼依然是: asdfghjkl;'
        if (user === 'alphabet' && pass === "asdfghjkl;'") {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-overlay').style.display = 'block';
            isGameRunning = true;
            setupFaceDetection(); // 進入遊戲後開啟監控
        } else {
            alert("登入失敗：憑據無效。");
        }
    }

    function emergencyLock() {
        isGameRunning = false;
        document.getElementById('game-overlay').style.display = 'none';
        document.getElementById('login-screen').style.display = 'block';
        window.location.reload(); // 強制刷新，不留痕跡
    }
</script>

</body>
</html>
